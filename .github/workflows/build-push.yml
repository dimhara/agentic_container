name: Build and Push Decoupled Agent Sandbox

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  AGENT_IMAGE_NAME: ${{ github.repository_owner }}/agentic-sandbox
  SERVER_IMAGE_NAME: ${{ github.repository_owner }}/llama-vulkan-server

jobs:
  build-and-push:
    name: Native Podman Build and Push
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Lowercase the Image Names
        run: |
          echo "AGENT_IMAGE_NAME=${AGENT_IMAGE_NAME,,}" >> ${GITHUB_ENV}
          echo "SERVER_IMAGE_NAME=${SERVER_IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Build Inference Server Image
        run: |
          podman build \
            -t ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}:${{ github.sha }} \
            -f Containerfile.server .

      - name: Build Agent Sandbox Image
        run: |
          podman build \
            -t ${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}:${{ github.sha }} \
            -f Containerfile.agent .

      - name: Log in to GitHub Container Registry (GHCR)
        run: |
          podman login ${{ env.REGISTRY }} \
            -u ${{ github.actor }} \
            -p ${{ secrets.GITHUB_TOKEN }}

      - name: Push Images to GHCR
        run: |
          # Push Server
          podman push ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}:latest
          podman push ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}:${{ github.sha }}
          
          # Push Agent
          podman push ${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}:latest
          podman push ${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}:${{ github.sha }}
          
      - name: Print resulting image info
        run: |
          echo "✅ Images successfully built and pushed!"
          echo "📦 Pull Server: podman pull ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}:latest"
          echo "📦 Pull Agent: podman pull ${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}:latest"

